name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Typecheck + Test
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test:bun
        timeout-minutes: 5

      - name: Integration tests
        run: bun run test:bun:int
        timeout-minutes: 5

      - name: Publish unit test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: test-results/unit/*.xml
          reporter: jest-junit
          fail-on-error: false

      - name: Publish integration test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Tests
          path: test-results/integration/*.xml
          reporter: jest-junit
          fail-on-error: false

  binary:
    name: Binary smoke test
    runs-on: ubuntu-latest
    # Only run on pushes to main and manual triggers — macOS/Linux compile is
    # expensive in CI minutes. PRs run the full test suite; binary is validated
    # on merge.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary (linux-x64 only)
        run: node scripts/build-binary.mjs --targets=bun-linux-x64
        timeout-minutes: 10

      - name: Smoke test — version flag
        run: ./bin/orager-linux-x64 --version

      - name: Smoke test — help flag
        run: ./bin/orager-linux-x64 --help || true
